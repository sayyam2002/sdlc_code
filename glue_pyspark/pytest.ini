[pytest]
testpaths = src/test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src/main
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    spark: Tests requiring Spark context
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning