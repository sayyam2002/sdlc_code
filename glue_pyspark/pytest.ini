[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = src/test

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=src/main
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

# Markers for test categorization
markers =
    unit: Unit tests for individual functions
    integration: Integration tests with AWS services
    smoke: Quick smoke tests
    slow: Tests that take longer to run
    scd2: Tests for SCD Type 2 functionality
    hudi: Tests for Hudi operations
    ingestion: Tests for data ingestion
    cleaning: Tests for data cleaning
    aggregation: Tests for data aggregation
    catalog: Tests for Glue Catalog operations

# Coverage options
[coverage:run]
source = src/main
omit =
    */test/*
    */__init__.py
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (seconds)
timeout = 300

# Parallel execution (install pytest-xdist for this)
# addopts = -n auto