[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = src/test

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=src/main
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80

# Markers for test categorization
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for data flows
    smoke: Quick smoke tests
    slow: Tests that take significant time
    aws: Tests requiring AWS services
    scd2: Tests for SCD Type 2 logic
    data_quality: Tests for data validation
    transformation: Tests for data transformations

# Coverage options
[coverage:run]
source = src/main
omit =
    */test/*
    */__init__.py
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov