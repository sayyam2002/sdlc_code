# AWS Glue Job Parameters Configuration

# Input Sources
inputs:
  customer:
    source_path: "s3://adif-sdlc/sdlc_wizard/customerdata/"
    source_format: "csv"
    schema:
      - name: "CustId"
        type: "string"
        nullable: false
      - name: "Name"
        type: "string"
        nullable: true
      - name: "EmailId"
        type: "string"
        nullable: true
      - name: "Region"
        type: "string"
        nullable: true

  order:
    source_path: "s3://adif-sdlc/sdlc_wizard/orderdata/"
    source_format: "csv"
    schema:
      - name: "OrderId"
        type: "string"
        nullable: false
      - name: "CustId"
        type: "string"
        nullable: false
      - name: "OrderDate"
        type: "string"
        nullable: true
      - name: "Amount"
        type: "string"
        nullable: true

  customer_previous_state:
    source_path: "s3://adif-sdlc/state/customer_previous/"
    source_format: "parquet"

# Output Targets
outputs:
  curated:
    target_path: "s3://adif-sdlc/curated/"
    target_format: "parquet"

  customer_state:
    target_path: "s3://adif-sdlc/state/customer_previous/"
    target_format: "parquet"

  analytics:
    target_path: "s3://adif-sdlc/analytics/customeraggregatespend/"
    target_format: "parquet"

  catalog:
    target_path: "s3://adif-sdlc/catalog/"
    target_format: "parquet"

# Glue Data Catalog Configuration
catalog:
  database: "sdlc_wizard_db"
  tables:
    customer: "sdlc_wizard_customer"
    order: "sdlc_wizard_order"
    ordersummary: "ordersummary"
    customeraggregatespend: "customeraggregatespend"

# Hudi Configuration for SCD Type 2
hudi:
  table_name: "ordersummary"
  base_path: "s3://adif-sdlc/catalog/sdlc_wizard_customer/"
  record_key: "CustId"
  precombine_field: "OpTs"
  table_type: "COPY_ON_WRITE"
  operation: "upsert"
  partition_fields: ""
  enable_hive_sync: true

# Processing Options
processing:
  null_string_literal: "Null"
  remove_nulls: true
  remove_duplicates: true
  encoding: "UTF-8"
  delimiter: ","
  header: true
  infer_schema: false

# SCD Type 2 Configuration
scd_type2:
  is_active_column: "IsActive"
  start_date_column: "StartDate"
  end_date_column: "EndDate"
  operation_timestamp_column: "OpTs"
  compare_columns:
    - "Name"
    - "EmailId"
    - "Region"

# Aggregation Configuration
aggregation:
  group_by_columns:
    - "CustId"
    - "OrderDate"
  aggregate_columns:
    - column: "Amount"
      function: "sum"
      alias: "TotalSpend"