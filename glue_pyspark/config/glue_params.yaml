# AWS Glue Job Parameters Configuration

# Input Sources
inputs:
  customer:
    source_path: "s3://adif-sdlc/sdlc_wizard/customerdata/"
    source_format: "csv"
  order:
    source_path: "s3://adif-sdlc/sdlc_wizard/orderdata/"
    source_format: "csv"

# Output Targets
outputs:
  customer:
    target_path: "s3://adif-sdlc/curated/sdlc_wizard/customer/"
    target_format: "parquet"
  order:
    target_path: "s3://adif-sdlc/curated/sdlc_wizard/order/"
    target_format: "parquet"
  ordersummary:
    target_path: "s3://adif-sdlc/curated/sdlc_wizard/ordersummary/"
    target_format: "hudi"
  customeraggregatespend:
    target_path: "s3://adif-sdlc/analytics/customeraggregatespend/"
    target_format: "parquet"

# AWS Glue Data Catalog
catalog:
  database: "sdlc_wizard_db"
  tables:
    customer: "sdlc_wizard_customer"
    order: "sdlc_wizard_order"
    ordersummary: "ordersummary"
    customeraggregatespend: "customeraggregatespend"

# Hudi Configuration for SCD Type 2
hudi:
  table_name: "ordersummary"
  record_key: "CustId,OrderId"
  precombine_field: "OpTs"
  table_type: "COPY_ON_WRITE"
  operation: "upsert"
  partition_fields: ""
  index_type: "GLOBAL_BLOOM"

# Processing Options
processing:
  enable_scd2: true
  enable_aggregation: true
  enable_incremental: true
  null_string_values:
    - "Null"
    - "NULL"
    - "null"

# Spark Configuration
spark:
  app_name: "CustomerOrderETL"
  log_level: "WARN"
  temp_path: "s3://adif-sdlc/temp/"
  spark_logs: "s3://adif-sdlc/spark-logs/"