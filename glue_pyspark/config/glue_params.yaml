# AWS Glue Job Parameters Configuration

# Input Sources
inputs_source_customer_path: "s3://adif-sdlc/sdlc_wizard/customerdata/"
inputs_source_order_path: "s3://adif-sdlc/sdlc_wizard/orderdata/"
inputs_source_format: "csv"
inputs_csv_delimiter: ","
inputs_csv_header: "true"

# Output Targets - Curated Layer
outputs_target_customer_path: "s3://adif-sdlc/curated/sdlc_wizard/customer/"
outputs_target_order_path: "s3://adif-sdlc/curated/sdlc_wizard/order/"
outputs_target_ordersummary_path: "s3://adif-sdlc/curated/sdlc_wizard/ordersummary/"

# Output Targets - Analytics Layer
outputs_target_analytics_path: "s3://adif-sdlc/analytics/customeraggregatespend/"

# Glue Data Catalog Configuration
catalog_database_name: "sdlc_wizard_db"
catalog_table_customer: "sdlc_wizard_customer"
catalog_table_order: "sdlc_wizard_order"
catalog_table_ordersummary: "sdlc_wizard_ordersummary"
catalog_table_analytics: "customeraggregatespend"

# Hudi Configuration for SCD Type 2
hudi_table_name: "ordersummary"
hudi_record_key: "OrderId"
hudi_precombine_field: "OpTs"
hudi_partition_field: "Date"
hudi_operation: "upsert"

# Processing Options
enable_job_bookmark: "true"
enable_data_quality: "true"
enable_scd_type2: "true"